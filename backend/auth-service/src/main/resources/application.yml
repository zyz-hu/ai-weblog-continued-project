server:
  port: 8084

spring:
  application:
    name: auth-service
  profiles:
    active: prod
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: "${AUTH_DB_URL:jdbc:p6spy:mysql://127.0.0.1:3306/weblog?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&zeroDateTimeBehavior=convertToNull}"
    username: "${AUTH_DB_USERNAME:root}"
    password: "${AUTH_DB_PASSWORD:change_me}"
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: Auth-HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
