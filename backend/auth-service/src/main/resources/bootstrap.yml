spring:
  application:
    name: auth-service
  profiles:
    active: prod
  cloud:
    nacos:
      config:
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        namespace: "${NACOS_NAMESPACE:prod}"
        group: DEFAULT_GROUP
        file-extension: yml
        refresh-enabled: true
      discovery:
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        namespace: "${NACOS_NAMESPACE:prod}"
        group: DEFAULT_GROUP
