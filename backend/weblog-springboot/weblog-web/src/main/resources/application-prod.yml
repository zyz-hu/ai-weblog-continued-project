server:
  port: 8082

spring:
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: "${WEBLOG_DB_URL:jdbc:p6spy:mysql://mysql:3306/weblog?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&zeroDateTimeBehavior=convertToNull}"
    username: "${WEBLOG_DB_USERNAME:root}"
    password: "${WEBLOG_DB_PASSWORD:change_me}"
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: Weblog-HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

logging:
  config: classpath:logback-weblog.xml

minio:
  endpoint: "${MINIO_ENDPOINT:http://minio:9000}"
  accessKey: "${MINIO_ACCESS_KEY:minioadmin}"
  secretKey: "${MINIO_SECRET_KEY:change_me}"
  bucketName: "${MINIO_BUCKET_NAME:weblog}"
