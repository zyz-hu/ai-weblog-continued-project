spring:
  application:
    name: weblog-springboot
  profiles:
    active: dev
  cloud:
    nacos:
      config:
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        namespace: "${NACOS_NAMESPACE:dev}"
        group: DEFAULT_GROUP
        file-extension: yml
        refresh-enabled: true
      discovery:
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        namespace: "${NACOS_NAMESPACE:dev}"
