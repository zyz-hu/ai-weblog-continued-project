<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="#EAF6FF"/>

  <!-- 天线 -->
  <line x1="100" y1="25" x2="100" y2="45" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="20" r="6" fill="#FF7A7A"/>

  <!-- 头部 -->
  <rect x="50" y="45" width="100" height="80" rx="25" fill="#FFFFFF" stroke="#555" stroke-width="4"/>

  <!-- 眼睛 -->
  <circle cx="80" cy="80" r="8" fill="#333"/>
  <circle cx="120" cy="80" r="8" fill="#333"/>

  <!-- 高光 -->
  <circle cx="77" cy="77" r="3" fill="#FFFFFF"/>
  <circle cx="117" cy="77" r="3" fill="#FFFFFF"/>

  <!-- 嘴巴 -->
  <path d="M85 100 Q100 110 115 100" stroke="#555" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 身体 -->
  <rect x="65" y="130" width="70" height="35" rx="18" fill="#FFFFFF" stroke="#555" stroke-width="4"/>

  <!-- 按钮 -->
  <circle cx="85" cy="148" r="4" fill="#6EC6FF"/>
  <circle cx="100" cy="148" r="4" fill="#FFD166"/>
  <circle cx="115" cy="148" r="4" fill="#FF7A7A"/>
</svg>
